# ──────────────────────────────────────────────────────────────
# URL 키워드 크롤러 입력 파일
# 실행: python extract_keyword.py urls.yaml [output.csv]
# ──────────────────────────────────────────────────────────────

# 전역 설정 (선택사항 — URL별 설정으로 덮어쓸 수 있음)
settings:
  max_pages: 500        # 도메인당 최대 크롤링 페이지 수 (기본 500)
  crawl_delay: 0.3      # 요청 간 대기 시간, 초 단위 (기본 0.3)

urls:
  # ── 단순 문자열 형식 (http/https 생략 가능) ──────────────────
  - https://ddzk.co.kr/
  - https://trigon.co.kr/

  # ── 상세 형식: label·개별 설정 지정 ─────────────────────────
  - url: https://www.samchuly.co.kr/
    label: 삼천리자전거        # 로그 표시용 이름 (선택)
    max_pages: 200             # 이 URL만 최대 200페이지로 제한

  - url: https://www.giant-bicycles.com/kr
    label: 자이언트코리아
    max_pages: 300
    crawl_delay: 0.5           # 이 사이트는 요청 간격을 더 길게
